<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Tổng Hợp Từ Vựng C1-C2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ecfdf5; /* Màu Emerald-50 nhạt mát mẻ */
        }
        
        .flip-card {
            perspective: 1000px;
            width: 100%;
            height: 520px; 
        }
        
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background-color: white;
            display: flex;
            flex-direction: column;
        }
        
        .flip-card-back {
            transform: rotateY(180deg);
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3); /* Emerald shadow */
            outline: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        
        .input-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #b91c1c !important;
        }

        #topic-toast {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <!-- Toast Notification -->
    <div id="topic-toast" class="absolute top-8 left-1/2 transform -translate-x-1/2 translate-y-[-250%] bg-white border-2 border-emerald-500 text-emerald-800 px-6 py-3 rounded-full shadow-2xl font-bold text-lg z-50 flex items-center gap-3">
        <span class="text-2xl">🌱</span> 
        <span id="toast-message">Chủ đề mới: Education</span> 
        <span class="text-2xl">🌱</span>
    </div>

    <div class="max-w-xl w-full mx-auto relative">
        <!-- Nút quay lại từ trước đó (ẩn ở thẻ đầu tiên) -->
        <button id="top-prev-btn" onclick="prevCard()" class="absolute left-0 top-0 mt-1 flex items-center justify-center p-2 text-gray-400 hover:text-emerald-700 hover:bg-emerald-100 rounded-full transition-colors hidden" title="Quay lại từ trước">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button>

        <!-- Header -->
        <div class="text-center mb-6">
            <h1 id="main-topic-title" class="text-3xl font-bold text-emerald-800 tracking-tight uppercase">CHỦ ĐỀ: CLIMATE CHANGE & SUSTAINABILITY</h1>
            <p class="text-emerald-600 mt-2 font-medium">Level: C1-C2 | <span id="progress-text">1 / X</span></p>
            
            <div class="w-full bg-emerald-200 rounded-full h-2.5 mt-4">
                <div id="progress-bar" class="bg-emerald-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Vùng chứa Flashcard -->
        <div class="flip-card" id="flashcard">
            <div class="flip-card-inner">
                
                <!-- Mặt trước: Câu hỏi -->
                <div class="flip-card-front p-6 md:p-8 border-t-4 border-emerald-500">
                    <div class="flex-grow flex flex-col justify-center items-center text-center">
                        
                        <!-- Nghĩa tiếng Việt và Loại từ -->
                        <div class="flex items-center justify-center gap-3 mb-2">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800" id="word-mean"></h2>
                            <span class="inline-block px-2 py-1 bg-teal-100 text-teal-800 rounded font-semibold text-sm uppercase" id="word-type"></span>
                        </div>

                        <div class="w-16 h-1 bg-emerald-200 my-4 mx-auto rounded"></div>
                        
                        <!-- Đã đổi vị trí: Câu tiếng Anh lên trước, câu tiếng Việt xuống dưới -->
                        <p class="text-xl md:text-2xl text-gray-700 font-medium mb-3 leading-relaxed" id="word-ex"></p>
                        <p class="text-gray-500 italic text-base md:text-lg mb-6" id="word-exVi"></p>

                        <div class="w-full flex flex-col items-center gap-4">
                            <div id="letter-inputs-container" class="flex flex-wrap justify-center gap-x-1 gap-y-3"></div>
                            
                            <!-- Nút Loa & Nút Hint -->
                            <div class="flex items-center justify-center gap-3">
                                <button onclick="speakCurrentWord()" class="flex items-center justify-center w-9 h-9 bg-teal-100 hover:bg-teal-200 text-teal-700 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-teal-400 shadow-sm" title="Nghe phát âm (Phím tắt: Shift + Enter)">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" /></svg>
                                </button>
                                <button onclick="giveHint()" title="Gợi ý (Phím tắt: Alt + H)" class="text-sm px-4 py-1.5 h-9 bg-amber-100 text-amber-700 hover:bg-amber-200 font-medium rounded-full transition-colors flex items-center gap-1 shadow-sm border border-amber-200">
                                    Hint
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="checkAnswer()" class="mt-4 w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg shadow-md transition-colors duration-200 flex items-center justify-center gap-2">
                        Check Answer
                    </button>
                </div>
                
                <!-- Mặt sau: Kết quả -->
                <div class="flip-card-back p-6 md:p-8 flex flex-col border-t-4 border-emerald-500">
                    <div id="result-header" class="text-center py-2 rounded-lg font-bold text-lg mb-4"></div>
                    
                    <div class="flex-grow flex flex-col justify-center items-center text-center">
                        <h2 class="text-4xl md:text-5xl font-bold text-gray-800 mb-2" id="back-word"></h2>
                        
                        <div class="flex items-center gap-2 mb-4 bg-teal-50 border border-teal-100 px-3 py-1.5 rounded-full">
                            <p class="text-xl text-teal-700 font-mono font-medium" id="back-phonetic"></p>
                            <button onclick="speakCurrentWord()" class="flex items-center justify-center w-8 h-8 bg-teal-200 hover:bg-teal-300 text-teal-800 rounded-full transition-colors focus:outline-none" title="Nghe phát âm (Phím tắt: Shift + Enter)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" /></svg>
                            </button>
                        </div>
                        
                        <p class="text-lg text-gray-600 font-medium mb-3" id="back-mean"></p>

                        <!-- Thêm khối hiển thị câu ví dụ trọn vẹn -->
                        <div class="bg-emerald-50/50 border border-emerald-200 rounded-lg p-4 w-full max-w-md mt-2">
                            <p class="text-gray-800 text-xl md:text-2xl font-medium leading-relaxed" id="back-ex"></p>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-4">
                        <button onclick="prevCard()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg transition-colors">Quay lại</button>
                        <button onclick="nextCard()" id="next-btn" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg shadow-md transition-colors">Tiếp theo</button>
                    </div>
                </div>
                
            </div>
        </div>
        
        <!-- Điểm số (hiện khi kết thúc) -->
        <div id="final-screen" class="hidden bg-white rounded-2xl shadow-xl p-8 text-center border-t-4 border-emerald-500">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Hoàn thành bài tập!</h2>
            <p class="text-lg text-gray-600 mb-6">Bạn đã ôn tập xong toàn bộ danh sách từ vựng.</p>
            <div class="text-6xl mb-6">🏆</div>
            <button onclick="resetQuiz()" class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg shadow-md transition-colors">Học lại từ đầu</button>
        </div>

    </div>

    <script>
        const flashcards = [
            // CLIMATE CHANGE & SUSTAINABILITY

            { topic: "Climate Change & Sustainability", word: "climate pledges", phonetic: "/ˈklaɪmət ˈpledʒɪz/", type: "n", mean: "cam kết khí hậu", ex: "Countries are making _______ to reduce greenhouse gas emissions.", exVi: "Các quốc gia đang đưa ra những cam kết khí hậu để giảm lượng khí thải nhà kính." },
            { topic: "Climate Change & Sustainability", word: "galvanize", phonetic: "/ˈɡælvənaɪz/", type: "v", mean: "thúc đẩy mạnh", ex: "The crisis helped _______ public support for environmental action.", exVi: "Cuộc khủng hoảng đã giúp thúc đẩy mạnh mẽ sự ủng hộ của công chúng đối với các hành động vì môi trường." },
            { topic: "Climate Change & Sustainability", word: "abatement", phonetic: "/əˈbeɪtmənt/", type: "n", mean: "sự giảm thiểu", ex: "Pollution _______ is necessary to protect public health.", exVi: "Sự giảm thiểu ô nhiễm là cần thiết để bảo vệ sức khỏe cộng đồng." },
            { topic: "Climate Change & Sustainability", word: "explicit", phonetic: "/ɪkˈsplɪsɪt/", type: "adj", mean: "rõ ràng", ex: "The instructions were _______, so everyone understood what to do.", exVi: "Các hướng dẫn rất rõ ràng, vì vậy mọi người đều hiểu phải làm gì." },
            { topic: "Climate Change & Sustainability", word: "emissions", phonetic: "/ɪˈmɪʃn/", type: "n", mean: "phát thải", ex: "Car _______ contribute significantly to air pollution in cities.", exVi: "Khí thải ô tô góp phần đáng kể vào tình trạng ô nhiễm không khí ở các thành phố." },
            { topic: "Climate Change & Sustainability", word: "carbon credits", phonetic: "/ˈkɑːbən ˈkredɪts/", type: "n", mean: "tín chỉ carbon", ex: "Companies can buy _______ to balance their emissions.", exVi: "Các công ty có thể mua tín chỉ carbon để cân bằng lượng khí thải của họ." },
            { topic: "Climate Change & Sustainability", word: "counterbalance", phonetic: "/ˈkaʊntəbæləns/", type: "v", mean: "bù đắp", ex: "Renewable energy can _______ the effects of fossil fuels.", exVi: "Năng lượng tái tạo có thể bù đắp lại tác động của nhiên liệu hóa thạch." },
            { topic: "Climate Change & Sustainability", word: "channel finance into", phonetic: "/ˈtʃænl ˈfaɪnæns ˈɪntə/", type: "v", mean: "chuyển tài chính vào", ex: "Governments should _______ clean energy projects.", exVi: "Các chính phủ nên chuyển tài chính vào các dự án năng lượng sạch." },

            { topic: "Climate Change & Sustainability", word: "decarbonization", phonetic: "/ˌdiːkɑːbənaɪˈzeɪʃn/", type: "n", mean: "khử carbon", ex: "_______ is essential for achieving global climate goals.", exVi: "Việc khử carbon là điều cần thiết để đạt được các mục tiêu khí hậu toàn cầu." },
            { topic: "Climate Change & Sustainability", word: "near-term leverage", phonetic: "/nɪər tɜːm ˈliːvərɪdʒ/", type: "n", mean: "đòn bẩy ngắn hạn", ex: "Renewable energy provides _______ for reducing emissions quickly.", exVi: "Năng lượng tái tạo cung cấp đòn bẩy ngắn hạn để giảm lượng khí thải một cách nhanh chóng." },

            { topic: "Climate Change & Sustainability", word: "displace", phonetic: "/dɪsˈpleɪs/", type: "v", mean: "thay thế", ex: "Renewable energy can _______ fossil fuels over time.", exVi: "Năng lượng tái tạo có thể thay thế nhiên liệu hóa thạch theo thời gian." },
            { topic: "Climate Change & Sustainability", word: "embed", phonetic: "/ɪmˈbed/", type: "v", mean: "tích hợp", ex: "Sustainability should be _______ in company policies.", exVi: "Tính bền vững nên được tích hợp vào các chính sách của công ty." },
            { topic: "Climate Change & Sustainability", word: "sequenced", phonetic: "/ˈsiːkwəns/", type: "v", mean: "sắp xếp theo trình tự", ex: "The steps must be carefully _______ to achieve the best results.", exVi: "Các bước phải được sắp xếp theo trình tự cẩn thận để đạt được kết quả tốt nhất." },
            { topic: "Climate Change & Sustainability", word: "absolute reductions", phonetic: "/ˈæbsəluːt rɪˈdʌkʃnz/", type: "n", mean: "giảm tuyệt đối", ex: "Countries aim for _______ in emissions.", exVi: "Các quốc gia hướng tới việc giảm tuyệt đối lượng khí thải." },
            { topic: "Climate Change & Sustainability", word: "stringent", phonetic: "/ˈstrɪndʒənt/", type: "adj", mean: "nghiêm ngặt", ex: "The government introduced _______ environmental regulations.", exVi: "Chính phủ đã ban hành các quy định nghiêm ngặt về môi trường." },
            { topic: "Climate Change & Sustainability", word: "third-party audit", phonetic: "/θɜːd ˈpɑːti ˈɔːdɪt/", type: "n", mean: "kiểm toán bên thứ ba", ex: "A _______ ensures that the data is accurate and reliable.", exVi: "Một cuộc kiểm toán của bên thứ ba đảm bảo rằng dữ liệu là chính xác và đáng tin cậy." },
            { topic: "Climate Change & Sustainability", word: "transparently", phonetic: "/trænˈspærəntli/", type: "adv", mean: "minh bạch", ex: "The company reported its emissions _______ to gain public trust.", exVi: "Công ty đã báo cáo lượng khí thải của mình một cách minh bạch để đạt được lòng tin của công chúng." },

            { topic: "Climate Change & Sustainability", word: "climate metrics", phonetic: "/ˈklaɪmət ˈmetrɪks/", type: "n", mean: "chỉ số khí hậu", ex: "_______ help track progress in reducing emissions.", exVi: "Các chỉ số khí hậu giúp theo dõi tiến độ giảm phát thải." },
            { topic: "Climate Change & Sustainability", word: "ancillary", phonetic: "/ænˈsɪləri/", type: "adj", mean: "phụ trợ", ex: "The project provides _______ benefits like job creation.", exVi: "Dự án cung cấp các lợi ích phụ trợ như tạo việc làm." },
            { topic: "Climate Change & Sustainability", word: "align with", phonetic: "/əˈlaɪn wɪð/", type: "v", mean: "phù hợp với", ex: "The plan must _______ international environmental standards.", exVi: "Kế hoạch phải phù hợp với các tiêu chuẩn môi trường quốc tế." },
            { topic: "Climate Change & Sustainability", word: "resilience", phonetic: "/rɪˈzɪliəns/", type: "n", mean: "khả năng phục hồi", ex: "Communities need _______ to deal with climate disasters.", exVi: "Các cộng đồng cần có khả năng phục hồi để đối phó với các thảm họa khí hậu." },
            { topic: "Climate Change & Sustainability", word: "land restoration", phonetic: "/lænd ˌrestəˈreɪʃn/", type: "n", mean: "phục hồi đất", ex: "_______ helps improve soil quality and biodiversity.", exVi: "Việc phục hồi đất giúp cải thiện chất lượng đất và đa dạng sinh học." },
            { topic: "Climate Change & Sustainability", word: "baseline", phonetic: "/ˈbeɪslaɪn/", type: "n", mean: "mức cơ sở", ex: "The _______ data is used to measure future improvements.", exVi: "Dữ liệu mức cơ sở được sử dụng để đo lường những cải thiện trong tương lai." },
            { topic: "Climate Change & Sustainability", word: "quantify", phonetic: "/ˈkwɒntɪfaɪ/", type: "v", mean: "định lượng", ex: "Scientists try to _______ the effects of climate change.", exVi: "Các nhà khoa học cố gắng định lượng các tác động của biến đổi khí hậu." },
            { topic: "Climate Change & Sustainability", word: "procure", phonetic: "/prəˈkjʊə/", type: "v", mean: "mua/đạt được", ex: "The company plans to _______ renewable energy for its operations.", exVi: "Công ty có kế hoạch mua năng lượng tái tạo cho các hoạt động của mình." },
            { topic: "Climate Change & Sustainability", word: "recognized standards", phonetic: "/ˈrekəɡnaɪzd ˈstændədz/", type: "n", mean: "tiêu chuẩn được công nhận", ex: "Products must meet _______ before being sold internationally.", exVi: "Các sản phẩm phải đáp ứng các tiêu chuẩn được công nhận trước khi được bán ra quốc tế." },
            { topic: "Climate Change & Sustainability", word: "document", phonetic: "/ˈdɒkjument/", type: "v", mean: "ghi lại", ex: "Researchers _______ their findings carefully.", exVi: "Các nhà nghiên cứu ghi lại những phát hiện của họ một cách cẩn thận." },
            { topic: "Climate Change & Sustainability", word: "retired tonnage", phonetic: "/rɪˈtaɪəd ˈtʌnɪdʒ/", type: "n", mean: "lượng carbon đã “nghỉ”", ex: "_______ refers to carbon credits that have been used and cannot be reused.", exVi: "Lượng carbon đã nghỉ đề cập đến các tín chỉ carbon đã được sử dụng và không thể tái sử dụng." },
            { topic: "Climate Change & Sustainability", word: "stakeholders", phonetic: "/ˈsteɪkhəʊldə/", type: "n", mean: "bên liên quan", ex: "_______ include employees, customers, and investors.", exVi: "Các bên liên quan bao gồm nhân viên, khách hàng và nhà đầu tư." },
            { topic: "Climate Change & Sustainability", word: "drive down", phonetic: "/draɪv daʊn/", type: "v", mean: "giảm xuống", ex: "New technologies can help _______ emissions.", exVi: "Các công nghệ mới có thể giúp làm giảm lượng khí thải xuống." },
            { topic: "Climate Change & Sustainability", word: "value chains", phonetic: "/ˈvæljuː tʃeɪn/", type: "n", mean: "chuỗi giá trị", ex: "Companies should reduce emissions across their entire _______.", exVi: "Các công ty nên giảm lượng khí thải trên toàn bộ chuỗi giá trị của họ." },
            { topic: "Climate Change & Sustainability", word: "year on year", phonetic: "/jɪər ɒn jɪər/", type: "adv", mean: "theo từng năm", ex: "The company reduced emissions _______.", exVi: "Công ty đã giảm lượng khí thải qua từng năm." },
            { topic: "Climate Change & Sustainability", word: "unviable", phonetic: "/ʌnˈvaɪəbl/", type: "adj", mean: "không khả thi", ex: "The project became _______ due to high costs.", exVi: "Dự án trở nên không khả thi do chi phí cao." },
            { topic: "Climate Change & Sustainability", word: "pacify", phonetic: "/ˈpæsɪfaɪ/", type: "v", mean: "xoa dịu", ex: "The company tried to _______ critics by improving its policies.", exVi: "Công ty đã cố gắng xoa dịu những người chỉ trích bằng cách cải thiện các chính sách của mình." },
            { topic: "Climate Change & Sustainability", word: "disorganize", phonetic: "/dɪsˈɔːɡənaɪz/", type: "v", mean: "làm rối loạn", ex: "Poor planning can _______ the entire project.", exVi: "Việc lập kế hoạch kém có thể làm rối loạn toàn bộ dự án." },
            { topic: "Climate Change & Sustainability", word: "lax", phonetic: "/læks/", type: "adj", mean: "lỏng lẻo", ex: "_______ regulations can lead to environmental damage.", exVi: "Các quy định lỏng lẻo có thể dẫn đến thiệt hại về môi trường." },
            { topic: "Climate Change & Sustainability", word: "exacting", phonetic: "/ɪɡˈzæktɪŋ/", type: "adj", mean: "khắt khe", ex: "The job requires _______ standards of accuracy.", exVi: "Công việc đòi hỏi những tiêu chuẩn khắt khe về độ chính xác." },
            { topic: "Climate Change & Sustainability", word: "rigorous", phonetic: "/ˈrɪɡərəs/", type: "adj", mean: "nghiêm ngặt", ex: "Scientists must follow _______ methods in their research.", exVi: "Các nhà khoa học phải tuân theo những phương pháp nghiêm ngặt trong nghiên cứu của họ." },
            { topic: "Climate Change & Sustainability", word: "auditor", phonetic: "/ˈɔːdɪtə/", type: "n", mean: "kiểm toán viên", ex: "The _______ checked the company’s financial records.", exVi: "Kiểm toán viên đã kiểm tra hồ sơ tài chính của công ty." },
            { topic: "Climate Change & Sustainability", word: "inventories", phonetic: "/ˈɪnvəntəriz/", type: "n", mean: "kiểm kê", ex: "The company keeps _______ of its emissions data.", exVi: "Công ty lưu giữ các bản kiểm kê về dữ liệu khí thải của mình." },
            { topic: "Climate Change & Sustainability", word: "systemic", phonetic: "/sɪˈstemɪk/", type: "adj", mean: "mang tính hệ thống", ex: "Climate change is a _______ problem affecting many sectors.", exVi: "Biến đổi khí hậu là một vấn đề mang tính hệ thống ảnh hưởng đến nhiều lĩnh vực." },
            { topic: "Climate Change & Sustainability", word: "remedy", phonetic: "/ˈremədi/", type: "n", mean: "giải pháp", ex: "There is no simple _______ for global warming.", exVi: "Không có một giải pháp đơn giản nào cho sự nóng lên toàn cầu." },
            { topic: "Climate Change & Sustainability", word: "transitional solution", phonetic: "/trænˈzɪʃənl səˈluːʃnz/", type: "n", mean: "giải pháp chuyển tiếp", ex: "Gas may be used as a _______ before switching fully to renewables.", exVi: "Khí đốt có thể được sử dụng như một giải pháp chuyển tiếp trước khi chuyển hoàn toàn sang năng lượng tái tạo." },
            { topic: "Climate Change & Sustainability", word: "concurrent", phonetic: "/kənˈkʌrənt/", type: "adj", mean: "đồng thời", ex: "Several actions must happen _______ to solve the issue.", exVi: "Một vài hành động phải diễn ra đồng thời để giải quyết vấn đề." },
            { topic: "Climate Change & Sustainability", word: "discourage", phonetic: "/dɪsˈkʌrɪdʒ/", type: "v", mean: "ngăn cản", ex: "High costs may _______ companies from investing in green technology.", exVi: "Chi phí cao có thể ngăn cản các công ty đầu tư vào công nghệ xanh." },
            { topic: "Climate Change & Sustainability", word: "by default", phonetic: "/baɪ dɪˈfɔːlt/", type: "adv", mean: "theo mặc định", ex: "The system is set to save energy _______.", exVi: "Hệ thống được thiết lập để tiết kiệm năng lượng theo mặc định." },
            { topic: "Climate Change & Sustainability", word: "co-benefits", phonetic: "/koʊ ˈbenɪfɪts/", type: "n", mean: "lợi ích đi kèm", ex: "Renewable energy provides _______ such as cleaner air and better health.", exVi: "Năng lượng tái tạo cung cấp các lợi ích đi kèm như không khí sạch hơn và sức khỏe tốt hơn." }
        ];

        let currentIndex = 0;
        const totalCards = flashcards.length;
        let canGoNext = false; // Thêm biến khóa phím Enter

        const flashcardEl = document.getElementById('flashcard');
        const inputsContainer = document.getElementById('letter-inputs-container');
        const finalScreen = document.getElementById('final-screen');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSuccessSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(987.77, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function playErrorSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            osc.frequency.setValueAtTime(250, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
            gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.1);
            gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.15);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function playTransitionSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3);
            osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.45);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.8);
        }

        // --- Tính năng Text-to-Speech ---
        let preferredVoice = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;
            
            const goodFemaleVoices = [
                "Google US English", 
                "Google UK English Female",
                "Samantha",         
                "Victoria",         
                "Karen",            
                "Microsoft Zira",   
                "Microsoft Hazel"   
            ];
            
            for (let name of goodFemaleVoices) {
                const voice = voices.find(v => v.name.includes(name));
                if (voice) {
                    preferredVoice = voice;
                    break;
                }
            }
            
            if (!preferredVoice) {
                preferredVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female')) || 
                                 voices.find(v => v.lang === 'en-US') || voices[0];
            }
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speakCurrentWord() {
            if(window.event) window.event.stopPropagation();
            
            const card = flashcards[currentIndex];
            const wordToSpeak = card.word.replace(/-/g, ' '); 
            const utterance = new SpeechSynthesisUtterance(wordToSpeak);
            
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            } else {
                utterance.lang = 'en-US'; 
            }
            
            utterance.rate = 0.85;    
            utterance.pitch = 1.15;   
            
            window.speechSynthesis.speak(utterance);
        }

        function showTopicToast(topicName) {
            const toast = document.getElementById('topic-toast');
            document.getElementById('toast-message').textContent = `Chủ đề mới: ${topicName}`;
            toast.classList.remove('translate-y-[-250%]');
            toast.classList.add('translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('translate-y-[-250%]');
            }, 2500);
        }

        function renderCard() {
            const card = flashcards[currentIndex];
            
            document.getElementById('main-topic-title').textContent = `CHỦ ĐỀ: ${card.topic.toUpperCase()}`;
            document.getElementById('word-type').textContent = card.type;
            
            document.getElementById('word-mean').textContent = card.mean;
            document.getElementById('word-exVi').textContent = card.exVi;
            
            const blankedEx = card.ex.replace('_______', `<span class="text-emerald-600 border-b-2 border-emerald-600 inline-block w-24"></span>`);
            document.getElementById('word-ex').innerHTML = blankedEx;
            
            inputsContainer.innerHTML = '';
            const words = card.word.split(' ');
            
            words.forEach((w, wordIndex) => {
                const wordGroup = document.createElement('div');
                wordGroup.className = 'flex gap-1';
                
                for (let i = 0; i < w.length; i++) {
                    if (w[i] === '-') {
                        const dash = document.createElement('span');
                        dash.textContent = '-';
                        dash.className = 'text-xl font-bold text-gray-400 self-center px-1';
                        wordGroup.appendChild(dash);
                        continue;
                    }

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    
                    if (i === 0) {
                        input.value = w[i].toLowerCase();
                        input.readOnly = true;
                        input.className = 'char-input hint-input w-9 h-11 md:w-10 md:h-12 text-center text-xl font-bold border-2 border-emerald-200 bg-emerald-100 text-emerald-700 rounded-lg cursor-not-allowed select-none shadow-sm';
                    } else {
                        input.className = 'char-input editable-input w-9 h-11 md:w-10 md:h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:border-teal-500 focus:bg-teal-50 transition-colors bg-white text-teal-700 shadow-inner';
                        
                        input.addEventListener('input', function() {
                            this.value = this.value.toLowerCase();
                            this.classList.remove('input-error');
                            
                            const editableInputs = Array.from(document.querySelectorAll('.editable-input'));
                            const currentIdx = editableInputs.indexOf(this);
                            if (this.value && currentIdx < editableInputs.length - 1) {
                                editableInputs[currentIdx + 1].focus();
                            }
                        });
                        
                        input.addEventListener('keydown', function(e) {
                            const editableInputs = Array.from(document.querySelectorAll('.editable-input'));
                            const currentIdx = editableInputs.indexOf(this);
                            
                            if (e.key === 'Backspace' && !this.value && currentIdx > 0) {
                                editableInputs[currentIdx - 1].focus();
                            } else if (e.key === 'Enter') {
                                if (!e.shiftKey) {
                                    e.preventDefault();
                                    e.stopPropagation(); 
                                    checkAnswer();
                                }
                            } else if (e.key === 'ArrowLeft' && currentIdx > 0) {
                                editableInputs[currentIdx - 1].focus();
                                e.preventDefault();
                            } else if (e.key === 'ArrowRight' && currentIdx < editableInputs.length - 1) {
                                editableInputs[currentIdx + 1].focus();
                                e.preventDefault();
                            }
                        });
                    }
                    wordGroup.appendChild(input);
                }
                inputsContainer.appendChild(wordGroup);
                
                if (wordIndex < words.length - 1) {
                    const space = document.createElement('div');
                    space.className = 'w-3 md:w-4';
                    inputsContainer.appendChild(space);
                }
            });
            
            setTimeout(() => {
                const firstEditableInput = document.querySelector('.editable-input');
                if (firstEditableInput) firstEditableInput.focus();
            }, 100);
            
            document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${totalCards}`;
            const percent = ((currentIndex + 1) / totalCards) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            const topPrevBtn = document.getElementById('top-prev-btn');
            if (currentIndex > 0) {
                topPrevBtn.classList.remove('hidden');
            } else {
                topPrevBtn.classList.add('hidden');
            }

            const nextBtn = document.getElementById('next-btn');
            if (currentIndex === totalCards - 1) {
                nextBtn.textContent = "Hoàn thành";
                nextBtn.className = "flex-1 py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg shadow-md transition-colors";
            } else {
                nextBtn.textContent = "Tiếp theo";
                nextBtn.className = "flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg shadow-md transition-colors";
            }
        }

        function giveHint() {
            const card = flashcards[currentIndex];
            const targetWord = card.word.replace(/[\s-]/g, ''); 
            const allInputs = document.querySelectorAll('.char-input');
            const editableInputs = document.querySelectorAll('.editable-input');
            
            for (let i = 0; i < allInputs.length; i++) {
                if (!allInputs[i].readOnly && allInputs[i].value.toLowerCase() !== targetWord[i].toLowerCase()) {
                    allInputs[i].value = targetWord[i].toLowerCase();
                    allInputs[i].classList.remove('input-error');
                    allInputs[i].classList.add('bg-amber-50', 'border-amber-400', 'text-amber-700');
                    
                    let currentEditableIdx = Array.from(editableInputs).indexOf(allInputs[i]);
                    let next = currentEditableIdx + 1;
                    while (next < editableInputs.length && editableInputs[next].value !== '') {
                        next++;
                    }
                    if (next < editableInputs.length) editableInputs[next].focus();
                    else editableInputs[editableInputs.length - 1].focus();
                    
                    break;
                }
            }
        }

        function checkAnswer() {
            const card = flashcards[currentIndex];
            const allInputs = document.querySelectorAll('.char-input');
            
            const userAnswer = Array.from(allInputs).map(inp => inp.value).join('').toLowerCase();
            const correctAnswer = card.word.replace(/[\s-]/g, '').toLowerCase();
            
            if (userAnswer === correctAnswer) {
                playSuccessSound();
                
                const resultHeader = document.getElementById('result-header');
                resultHeader.textContent = "🎉 Chính xác!";
                resultHeader.className = "text-center py-2 rounded-lg font-bold text-lg mb-4 bg-emerald-100 text-emerald-800";

                document.getElementById('back-word').textContent = card.word;
                document.getElementById('back-phonetic').textContent = card.phonetic;
                document.getElementById('back-mean').textContent = `${card.mean} (${card.type})`;

                const fullSentence = card.ex.replace('_______', `<span class="font-bold text-emerald-700">${card.word}</span>`);
                document.getElementById('back-ex').innerHTML = fullSentence;

                flashcardEl.classList.add('flipped');
                
                canGoNext = false;
                setTimeout(() => { canGoNext = true; }, 500);
                
                if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                    document.activeElement.blur();
                }
            } else {
                playErrorSound();
                inputsContainer.classList.add('shake');
                setTimeout(() => inputsContainer.classList.remove('shake'), 400);
                
                let firstEmptyOrWrongInput = null;

                for (let i = 0; i < allInputs.length; i++) {
                    if (!allInputs[i].readOnly) {
                        if (allInputs[i].value !== '' && allInputs[i].value.toLowerCase() !== correctAnswer[i]) {
                            allInputs[i].value = ''; 
                            allInputs[i].classList.add('input-error');
                            if (!firstEmptyOrWrongInput) firstEmptyOrWrongInput = allInputs[i];
                        } else if (allInputs[i].value === '') {
                             allInputs[i].classList.add('input-error');
                             if (!firstEmptyOrWrongInput) firstEmptyOrWrongInput = allInputs[i];
                        }
                    }
                }
                
                if (firstEmptyOrWrongInput) {
                    firstEmptyOrWrongInput.focus();
                }
            }
        }

        function nextCard() {
            flashcardEl.classList.remove('flipped');
            
            setTimeout(() => {
                if (currentIndex < totalCards - 1) {
                    const currentTopic = flashcards[currentIndex].topic;
                    const nextTopicCard = flashcards[currentIndex + 1].topic;
                    
                    currentIndex++;
                    
                    if (currentTopic !== nextTopicCard) {
                        showTopicToast(nextTopicCard);
                        playTransitionSound();
                    }
                    
                    renderCard();
                } else {
                    flashcardEl.classList.add('hidden');
                    finalScreen.classList.remove('hidden');
                }
            }, 300);
        }

        function prevCard() {
            if (currentIndex > 0) {
                flashcardEl.classList.remove('flipped');
                setTimeout(() => {
                    currentIndex--;
                    renderCard();
                }, 300);
            } else {
                flashcardEl.classList.remove('flipped');
            }
        }

        function resetQuiz() {
            currentIndex = 0;
            finalScreen.classList.add('hidden');
            flashcardEl.classList.remove('hidden');
            renderCard();
        }

        document.addEventListener('keydown', function (e) {
            if (e.altKey && e.key.toLowerCase() === 'h') {
                e.preventDefault();
                giveHint();
                return; 
            }

            if ((e.shiftKey && e.key === 'Enter') || (e.ctrlKey && e.code === 'Space')) {
                e.preventDefault();
                speakCurrentWord();
                return; 
            }

            if (e.key === 'Enter' && !e.shiftKey && flashcardEl.classList.contains('flipped') && canGoNext) {
                e.preventDefault();
                nextCard();
            }
        });

        document.addEventListener('DOMContentLoaded', renderCard);

    </script>
</body>
</html>
