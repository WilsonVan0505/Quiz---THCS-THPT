<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàng Trường English - Learning Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cambria', 'Georgia', 'Times New Roman', 'serif'],
                        serif: ['Cambria', 'Georgia', 'Times New Roman', 'serif'],
                    },
                    colors: {
                        bakery: {
                            bg: '#fdfbf7',
                            brown: '#5c4033',
                            accent: '#e6a87c',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fdfbf7;
            background-image: radial-gradient(#e6a87c 0.5px, transparent 0.5px), radial-gradient(#e6a87c 0.5px, #fdfbf7 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Cambria', serif;
        }
        .menu-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-item:hover {
            transform: translateX(10px);
            background-color: #fffaf5;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center">

    <!-- Header Section -->
    <header class="text-center max-w-2xl mx-auto mb-12 relative z-10 bg-white/90 backdrop-blur-md p-10 rounded-3xl shadow-sm border border-orange-100 w-full">
        <h1 class="text-3xl md:text-4xl font-bold text-bakery-brown mb-3 tracking-tight">
            Hoàng Trường English
        </h1>
        <div class="h-1 w-20 bg-bakery-accent mx-auto mb-6 rounded-full"></div>
        <p class="text-lg text-gray-600 italic">
            Learning Resources Portal
        </p>
    </header>

    <!-- Main Navigation List -->
    <nav class="w-full max-w-2xl mx-auto relative z-10 space-y-4">
        <div class="bg-white rounded-3xl shadow-xl border border-orange-50 overflow-hidden p-2">
            
            <!-- Item 1: Vocabulary Guide -->
            <!-- Lưu ý: Link này dẫn đến mục đầu tiên trong bộ từ vựng hoặc trang tổng quát của bạn -->
            <a href="https://hoangtruongenglish.com/former/mastervocal" target="_blank" class="menu-item block p-8 rounded-2xl group border border-transparent hover:border-orange-100">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-6">
                        <div class="bg-bakery-accent/10 p-4 rounded-2xl text-bakery-accent group-hover:bg-bakery-accent group-hover:text-white transition-colors">
                            <i class="fa-solid fa-book-open text-3xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-bakery-brown">The Master Baker's Vocabulary Guide</h2>
                            <p class="text-gray-500 text-sm mt-1">Explore essential baking terminology and techniques.</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right text-gray-300 group-hover:text-bakery-accent group-hover:translate-x-2 transition-all"></i>
                </div>
            </a>

            <div class="border-t border-orange-50 mx-6"></div>

            <!-- Item 2: Unit 1 of Book 1 -->
            <a href="https://hoangtruongenglish.com/former/unit1b1" target="_blank" class="menu-item block p-8 rounded-2xl group border border-transparent hover:border-blue-100">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-6">
                        <div class="bg-blue-50 p-4 rounded-2xl text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                            <i class="fa-solid fa-graduation-cap text-3xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-bakery-brown">Unit 1 of Book 1</h2>
                            <p class="text-gray-500 text-sm mt-1">Access the official lesson content for Unit 1.</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right text-gray-300 group-hover:text-blue-500 group-hover:translate-x-2 transition-all"></i>
                </div>
            </a>
            
        </div>
    </nav>

    <!-- Footer -->
    <footer class="mt-16 text-center text-sm text-gray-500 relative z-10">
        <p class="font-medium">Copyright &copy; 2026 Hoàng Trường English</p>
    </footer>

</body>
</html>
